# Condizioni d'uso di POI•LOVE

**Ultimo aggiornamento: 27/06/2026**

Benvenuto su POI•LOVE. Queste Condizioni d'uso (le "Condizioni") regolano l'accesso e l'utilizzo dell'applicazione web POI•LOVE, del relativo sito e di tutti i servizi collegati (insieme, il "Servizio"). Ti chiediamo di leggerle con attenzione: usando POI•LOVE accetti integralmente quanto segue.

POI•LOVE tratta dati personali, inclusa la tua posizione e le foto che carichi. Il modo in cui questi dati vengono raccolti e usati è descritto nell'**Informativa sulla privacy** disponibile su poilove.com/privacy, che costituisce parte integrante di queste Condizioni.

---

## 1. Accettazione delle Condizioni

Creando un account, accedendo o utilizzando in qualsiasi modo il Servizio, dichiari di aver letto, compreso e accettato queste Condizioni e l'Informativa sulla privacy.

Se non accetti anche solo una parte delle Condizioni, non puoi utilizzare il Servizio.

Se utilizzi POI•LOVE per conto di un'organizzazione, dichiari di avere il potere di vincolarla a queste Condizioni.

---

## 2. Chi siamo (Titolare del Servizio)

Il Servizio è fornito da:

- **Alessandro Castagna**, operante come **321.AL / EVOLAB**
- Contatto: **it@altrostile.app**

In queste Condizioni i termini "noi", "ci" e "nostro" si riferiscono al Titolare sopra indicato.

---

## 3. Descrizione del Servizio

POI•LOVE è una **mappa comunitaria dei luoghi amati**. Il Servizio permette, tra l'altro, di:

- **Scoprire e creare POI** (Point of Interest, "punti d'interesse"): luoghi sulla mappa con nome, descrizione, categoria e foto;
- esprimere apprezzamento per i luoghi ("**love**") e seguire altri utenti;
- creare e condividere **liste** e **itinerari** di luoghi;
- trovare **compagni di viaggio** e connetterti con altri membri della comunità;
- usare **ILLI**, un assistente basato su intelligenza artificiale, per ricevere suggerimenti su luoghi e zone;
- ricercare luoghi "**vicino a me**" tramite la geolocalizzazione del dispositivo;
- accumulare **punti** e partecipare a meccaniche di gamification e referral;
- attivare, se vuoi, un **abbonamento a pagamento** per accedere a vantaggi aggiuntivi (vedi sezione 11).

Il Servizio è in continua evoluzione: possiamo aggiungere, modificare o rimuovere funzionalità in qualsiasi momento, cercando di limitare gli impatti sull'esperienza d'uso.

---

## 4. Chi può iscriversi (età minima)

Per usare POI•LOVE devi avere **almeno 16 anni**.

Questo limite riflette la normativa albanese sulla protezione dei dati personali (Legge n. 124/2024) e il GDPR UE, secondo cui il trattamento dei dati di un minore per servizi online basati sul consenso è lecito solo a partire dai 16 anni. Se hai meno di 16 anni non puoi creare un account né usare il Servizio.

Se sei un genitore o tutore e ritieni che un minore di 16 anni abbia creato un account, contattaci a **it@altrostile.app** e provvederemo a chiudere l'account e cancellare i relativi dati.

Per usare il Servizio devi inoltre fornire informazioni veritiere in fase di registrazione e mantenere riservate le credenziali del tuo account. Sei responsabile di ogni attività svolta tramite il tuo account.

---

## 5. Account e autenticazione

Puoi registrarti tramite email oppure tramite provider esterni (Google, X, LinkedIn) gestiti attraverso il nostro fornitore di autenticazione Supabase. Accedendo con un provider esterno autorizzi POI•LOVE a ricevere dai relativi servizi i dati di base del tuo profilo (ad esempio email, nome utente e immagine), secondo quanto indicato nell'Informativa sulla privacy.

Sei responsabile della sicurezza delle tue credenziali. Avvisaci subito a **it@altrostile.app** se sospetti un accesso non autorizzato al tuo account.

---

## 6. Contenuti caricati dagli utenti (UGC)

Il Servizio ti consente di caricare e pubblicare contenuti: foto, testi, descrizioni di luoghi, liste, itinerari, commenti e altro materiale (i "**Contenuti utente**"). Resti il titolare dei tuoi Contenuti utente, ma sei pienamente responsabile di ciò che pubblichi.

### 6.1 Garanzie sui tuoi contenuti

Caricando un Contenuto utente dichiari e garantisci che:

- ne possiedi i **diritti** necessari oppure hai ottenuto tutte le autorizzazioni richieste per pubblicarlo e concederci la licenza descritta al punto 6.4;
- il contenuto **non viola** diritti di terzi, inclusi diritti d'autore, marchi, diritti all'immagine, alla riservatezza e alla protezione dei dati personali;
- le informazioni che fornisci sui luoghi sono, per quanto a tua conoscenza, accurate e in buona fede.

### 6.2 Foto di persone identificabili

Le foto possono ritrarre persone, e un volto identificabile è un dato personale (in alcuni casi un dato di natura particolare, "sensibile"). Per questo:

- **non devi caricare foto che ritraggono persone identificabili senza il loro consenso**;
- se la foto ritrae un minore, ti serve il consenso di chi ne esercita la responsabilità genitoriale;
- non devi caricare immagini che possano essere usate per identificare in modo univoco una persona (ad esempio per riconoscimento facciale) senza un consenso esplicito e specifico della persona interessata;
- preferisci, dove possibile, foto del luogo che **non** contengano persone riconoscibili.

Sei tu il responsabile di aver ottenuto questi consensi. Se una persona ritratta ci chiede la rimozione di una foto, possiamo rimuoverla senza preavviso.

### 6.3 Contenuti vietati

Non puoi caricare, pubblicare o trasmettere contenuti che:

- siano illeciti, diffamatori, offensivi, osceni, discriminatori, violenti o che incitino all'odio;
- molestino, minaccino o ledano la dignità o la riservatezza di altre persone;
- violino diritti di proprietà intellettuale o industriale di terzi;
- contengano dati personali altrui diffusi senza base giuridica;
- contengano malware, spam, pubblicità non autorizzata o link ingannevoli;
- segnalino come "luoghi amati" posizioni che mettano a rischio la sicurezza o la privacy di persone (ad esempio abitazioni private di terzi indicate senza consenso);
- siano comunque contrari a queste Condizioni, alla legge applicabile o al buon costume.

### 6.4 Licenza che ci concedi

Per poter mostrare i tuoi contenuti pubblici all'interno del Servizio, concedi a POI•LOVE una licenza **non esclusiva, gratuita, valida in tutto il mondo, trasferibile e cedibile in sublicenza ai nostri fornitori tecnici** (ad esempio per l'hosting), limitata alle finalità di **far funzionare, mostrare, promuovere e migliorare il Servizio**.

Questa licenza riguarda i contenuti che scegli di rendere **pubblici** (ad esempio un POI pubblico con la sua foto, una lista o un itinerario condiviso) e dura finché tali contenuti restano sul Servizio. Quando cancelli un contenuto o il tuo account, la licenza cessa per i contenuti rimossi, fatti salvi i tempi tecnici di propagazione della cancellazione e gli eventuali contenuti che altri utenti abbiano nel frattempo copiato o salvato e le copie di backup che vengono sovrascritte secondo i normali cicli.

La licenza serve unicamente a erogare il Servizio: non rivendichiamo la proprietà dei tuoi Contenuti utente e non li venderemo a terzi.

### 6.5 Moderazione e rimozione

Non siamo obbligati a controllare preventivamente i Contenuti utente, ma possiamo **rimuovere o rendere non visibile** qualsiasi contenuto che riteniamo, a nostro ragionevole giudizio, in violazione di queste Condizioni o della legge, anche senza preavviso. Puoi **segnalare** contenuti o profili inappropriati tramite gli strumenti di segnalazione del Servizio, oppure scrivendo a **it@altrostile.app**.

Per ragioni di sicurezza e per adempiere agli obblighi di legge, **registriamo le segnalazioni** ricevute e le **azioni di moderazione** che adottiamo (ad esempio rimozione di un contenuto, sospensione o blocco di un profilo), come descritto nell'Informativa sulla privacy. Usiamo questi dati per gestire le segnalazioni, proteggere gli utenti e, se necessario, come prova in caso di abusi o contestazioni.

---

## 7. Geolocalizzazione

Alcune funzioni (ricerca "vicino a me", creazione di un POI nella tua posizione, suggerimenti di luoghi vicini) richiedono l'accesso alla **posizione del tuo dispositivo**.

L'uso della geolocalizzazione avviene solo con il tuo **consenso**, che presti tramite le impostazioni del browser o del dispositivo e che puoi **revocare in qualsiasi momento** dalle stesse impostazioni. Se revochi il consenso, alcune funzioni basate sulla posizione potrebbero non funzionare. I dettagli sul trattamento della posizione sono nell'Informativa sulla privacy.

---

## 8. L'assistente ILLI (intelligenza artificiale)

ILLI è un assistente che usa modelli di **intelligenza artificiale** (forniti da **OpenAI** e/o **Anthropic**) per generare suggerimenti su luoghi e zone, e che attinge informazioni sui luoghi da fonti esterne come **Google Places** e **OpenStreetMap**. Lo stesso vale per il **copilota amministrativo** basato su AI, riservato alle funzioni di gestione.

Quando usi ILLI tieni presente che:

- le risposte sono **generate automaticamente** e possono contenere **imprecisioni, errori o informazioni non aggiornate**;
- le informazioni sui luoghi provengono da banche dati di terzi e possono essere **datate, incomplete o errate** (orari, indirizzi, esistenza stessa del luogo);
- i suggerimenti di ILLI **non costituiscono consulenza professionale** (legale, medica, finanziaria, di sicurezza o di altro tipo) e non vanno usati come unica fonte per decisioni importanti;
- prima di recarti in un luogo o prendere decisioni di viaggio, ti invitiamo a **verificare** le informazioni in modo autonomo.

Per fornire le risposte, i messaggi che invii a ILLI o al copilota amministrativo (che possono includere la tua città o zona) vengono inviati a fornitori terzi (**OpenAI** e/o **Anthropic**), con server anche al di fuori dell'Albania e dell'Unione Europea, come spiegato nell'Informativa sulla privacy. Ti invitiamo a **non inserire dati sensibili o riservati** nelle chat con l'assistente. Usando ILLI accetti questo funzionamento.

---

## 9. Proprietà intellettuale e codice open source

### 9.1 Marchio e contenuti del Servizio

Il nome "POI•LOVE", il logo, la mascotte ILLI•AI, la grafica e gli altri elementi distintivi del Servizio appartengono al Titolare e sono protetti dalle norme su marchi e diritto d'autore. Non puoi usarli senza nostra autorizzazione scritta, salvo quanto consentito dalla licenza open source per le parti di codice.

### 9.2 Codice open source (licenza MIT)

Il codice sorgente del progetto POI•LOVE è rilasciato sotto **licenza MIT**. Ciò significa che il **codice** può essere usato, copiato, modificato e ridistribuito secondo i termini della licenza MIT, che accompagna il repository del progetto.

La licenza MIT si applica al **codice**: **non** si estende ai Contenuti utente, ai dati della comunità, al marchio "POI•LOVE", al logo, alla mascotte e agli altri elementi grafici e distintivi, che restano protetti come indicato al punto 9.1.

---

## 10. Uso corretto del Servizio

Ti impegni a non:

- usare il Servizio per scopi illeciti o in violazione di diritti altrui;
- estrarre massivamente dati (scraping), copiare o riutilizzare il database della comunità al di fuori di quanto consentito dalla legge o da queste Condizioni;
- sovraccaricare, danneggiare o compromettere il funzionamento del Servizio o delle sue infrastrutture, né aggirarne le misure di sicurezza;
- usare bot, script o mezzi automatizzati per creare account o contenuti falsi, manipolare punti, "love", follow o le meccaniche di gamification;
- impersonare altre persone o trarre in inganno gli altri utenti.

---

## 11. Abbonamenti a pagamento

Alcune funzioni e vantaggi del Servizio possono essere offerti tramite **abbonamenti a pagamento**, organizzati in tier (**Professionista, Sostenitore, Mecenate**). Aderendo a un tier:

- accetti il **prezzo, la durata e le condizioni di rinnovo** indicati al momento dell'attivazione;
- ci autorizzi a trattare i dati necessari a gestire l'abbonamento (tier scelto, stato, date di attivazione e rinnovo), come descritto nell'Informativa sulla privacy;
- prendi atto che i **dati di pagamento** sono trattati dal fornitore di pagamento che useremo, secondo la sua informativa, e che noi non conserviamo i dati della tua carta.

I **vantaggi** collegati a ciascun tier sono indicati nell'app e possono evolvere nel tempo: cercheremo di non ridurre vantaggi essenziali già attivi senza un congruo preavviso. Eventuali diritti di recesso e rimborso previsti dalla normativa a tutela dei consumatori restano fermi. Puoi disdire l'abbonamento secondo le modalità indicate nell'app o scrivendo a **it@altrostile.app**; salvo diversa previsione di legge, la disdetta ha effetto al termine del periodo già pagato.

---

## 12. Servizi e link di terzi

Il Servizio si integra con fornitori e fonti di terzi (tra cui Supabase, OpenAI, Anthropic, Google, OpenStreetMap) e può contenere link a siti esterni. Non controlliamo questi servizi e non siamo responsabili dei loro contenuti, della loro disponibilità o delle loro condizioni e informative. L'uso di servizi terzi è soggetto ai termini dei rispettivi fornitori.

---

## 13. Limitazione di responsabilità

Il Servizio è fornito "**così com'è**" e "**come disponibile**", senza garanzie di alcun tipo, esplicite o implicite, riguardo a continuità, assenza di errori, accuratezza dei dati sui luoghi o idoneità a uno scopo specifico.

Nei limiti massimi consentiti dalla legge applicabile:

- **non siamo responsabili** per i Contenuti utente pubblicati da altri, né per l'esattezza delle informazioni sui luoghi fornite da fonti terze o da ILLI;
- **non siamo responsabili** per danni indiretti, incidentali o consequenziali derivanti dall'uso o dal mancato uso del Servizio, inclusi danni legati a decisioni di viaggio, spostamenti verso luoghi o incontri con altri utenti;
- ti assumi la responsabilità delle tue scelte quando ti rechi in un luogo o ti incontri con altri membri della comunità, adottando le normali cautele.

Nulla in queste Condizioni esclude o limita la nostra responsabilità laddove ciò non sia consentito dalla legge applicabile (ad esempio in caso di dolo o colpa grave, o di responsabilità non escludibili verso i consumatori).

Nei limiti consentiti, la tua **unica tutela** in caso di insoddisfazione verso il Servizio è **smettere di usarlo** e chiudere il tuo account.

---

## 14. Sospensione e chiusura dell'account

### 14.1 Chiusura da parte tua

Puoi smettere di usare il Servizio e **chiudere il tuo account** in qualsiasi momento dalle impostazioni dell'app o scrivendo a **it@altrostile.app**. La chiusura comporta la cancellazione dei dati secondo quanto descritto nell'Informativa sulla privacy e nel rispetto dei tuoi diritti previsti dalla normativa (incluso il diritto alla cancellazione).

### 14.2 Sospensione o chiusura da parte nostra

Possiamo **sospendere o chiudere** il tuo account, in tutto o in parte, se:

- violi queste Condizioni o la legge applicabile;
- pubblichi contenuti vietati o lesivi dei diritti di terzi;
- usi il Servizio in modo fraudolento, abusivo o tale da danneggiare gli altri utenti o l'infrastruttura.

Dove ragionevolmente possibile ti daremo un preavviso e la possibilità di rimediare; nei casi gravi o urgenti potremo intervenire **senza preavviso**. La chiusura non ti priva dei diritti che la normativa sulla protezione dei dati ti riconosce sui tuoi dati personali.

---

## 15. Modifiche alle Condizioni

Possiamo modificare queste Condizioni, ad esempio per adeguarle a nuove funzionalità o a obblighi di legge. In caso di modifiche rilevanti te ne daremo avviso con mezzi adeguati (ad esempio un avviso nell'app o via email) e aggiorneremo la data di "Ultimo aggiornamento" in cima al documento.

Continuando a usare il Servizio dopo l'entrata in vigore delle modifiche, accetti le Condizioni aggiornate. Se non le accetti, puoi chiudere il tuo account.

---

## 16. Legge applicabile e foro competente

Queste Condizioni sono regolate dalla **legge della Repubblica d'Albania**, inclusa la **Legge n. 124/2024 sulla protezione dei dati personali**. Per gli utenti residenti nell'Unione Europea restano fermi i diritti inderogabili previsti dal **GDPR (Regolamento UE 2016/679)** e dalle norme imperative del Paese di residenza.

Per ogni controversia relativa al Servizio è competente il **foro di Tirana (Albania)**, salvo il foro inderogabile previsto dalla legge a tutela del consumatore, qualora applicabile.

Le questioni relative al trattamento dei tuoi dati personali sono disciplinate dall'Informativa sulla privacy. Hai sempre diritto di proporre **reclamo all'Autorità albanese per la protezione dei dati (Komisioneri / IDP, idp.al)** o, se risiedi nell'UE, all'autorità di controllo del tuo Paese.

---

## 17. Disposizioni varie

- **Nullità parziale**: se una clausola di queste Condizioni risulta invalida o inefficace, le restanti clausole restano valide.
- **Tolleranza**: il mancato esercizio di un diritto non costituisce rinuncia allo stesso.
- **Intero accordo**: queste Condizioni e l'Informativa sulla privacy costituiscono l'intero accordo tra te e il Titolare riguardo al Servizio.
- **Lingue**: il Servizio è offerto in italiano, albanese e inglese. In caso di divergenza tra le versioni, fa fede la versione che indicheremo come ufficiale nel rispetto della normativa applicabile a tutela dei consumatori.

---

Per domande su queste Condizioni, segnalazioni di contenuti o richieste relative al tuo account scrivi a:

- **Email**: it@altrostile.app

Per le richieste relative ai tuoi dati personali (accesso, rettifica, cancellazione, opposizione, portabilità, revoca del consenso) consulta l'Informativa sulla privacy su poilove.com/privacy.</script>
