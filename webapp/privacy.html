# Informativa sulla privacy di POI•LOVE

*Ultimo aggiornamento: 06/07/2026*

POI•LOVE è la mappa comunitaria dei luoghi amati: uno spazio dove le persone segnano, raccontano e condividono i posti a cui tengono. Per farlo funzionare trattiamo alcuni tuoi dati personali. Questa informativa ti spiega, in modo onesto e leggibile, quali dati raccogliamo, perché, su quale base giuridica, con chi li condividiamo, per quanto li conserviamo e quali diritti hai.

POI•LOVE viene lanciata pubblicamente in Albania ed è soggetta alla legge albanese n. 124/2024 sulla protezione dei dati personali, allineata al Regolamento UE 2016/679 (GDPR). Se sei un utente nell'Unione Europea, ti si applica anche il GDPR. Trattiamo i tuoi dati nel rispetto di entrambi.

---

## 1. Chi tratta i tuoi dati (titolare e contatti)

Il titolare del trattamento è:

**Alessandro Castagna, 321.AL / EVOLAB**
Contatto per qualsiasi questione relativa ai dati e per esercitare i tuoi diritti: **it@altrostile.app**

Per ogni domanda, richiesta o reclamo sulla privacy puoi scriverci a questo indirizzo. Rispondiamo entro i tempi previsti dalla legge (vedi sezione 8).

Nota di trasparenza: stiamo valutando la nomina di un Responsabile della protezione dei dati (DPO) e di un rappresentante in Albania, come richiesto dalla legge n. 124/2024 per i trattamenti su larga scala. Appena nominati, i loro recapiti saranno pubblicati qui e comunicati all'Autorità.

---

## 2. Quali dati raccogliamo e perché

Raccogliamo solo i dati che servono a far funzionare l'app. Ecco l'elenco completo, categoria per categoria.

### 2.1 Dati di registrazione e account
- **Email** e, in caso di registrazione classica, **password** (conservata solo in forma cifrata, non in chiaro).
- Se ti registri tramite un provider esterno (**Google, Facebook, Apple, X (Twitter) o LinkedIn**), riceviamo dal provider che scegli: email, nome o handle, immagine del profilo. Se non compili un username, ne generiamo uno di default partendo dalla parte iniziale della tua email (la parte prima della @): puoi cambiarlo in qualsiasi momento dal profilo.

*Perché:* per creare il tuo account, autenticarti, permetterti di recuperare l'accesso e gestire il servizio. Senza questi dati non possiamo darti un account.

### 2.2 Dati del profilo pubblico
- **Username** (obbligatorio), **nome visualizzato**, **avatar**, **bio**, **lingua preferita**.

*Perché:* per identificarti pubblicamente nell'app, mostrare il tuo profilo agli altri utenti, permetterti di avere un indirizzo personale (@username). Nome, avatar e bio sono facoltativi: decidi tu cosa mostrare.

### 2.3 Posizione geografica (GPS)
- **Coordinate** (latitudine e longitudine) quando attivi la geolocalizzazione, più eventuale indirizzo, città e Paese ricavati da quelle coordinate.

*Perché:* per mostrarti i luoghi vicino a te, permetterti di creare un POI nel punto esatto in cui ti trovi, far funzionare la ricerca "vicino a me" e la navigazione verso un luogo.

La posizione è uno dei dati più delicati che trattiamo, perché può rivelare le tue abitudini. Per questo:
- la attiviamo **solo quando serve** (quando crei o cerchi un POI, o navighi), non in sottofondo di continuo;
- ti chiediamo sempre il permesso tramite il browser o il dispositivo;
- puoi negarla o revocarla in qualsiasi momento dalle impostazioni del browser o del dispositivo, e dalle impostazioni dell'app.

### 2.4 Foto che carichi
- **Foto dei luoghi (POI)** e **foto del profilo** che decidi di caricare.

*Perché:* per documentare e illustrare i luoghi, e per personalizzare il tuo profilo.

Leggi con attenzione la **sezione 4** su consenso e foto: le foto possono ritrarre persone, e qui ci sono regole e responsabilità precise.

Le foto che carichi vengono elaborate e archiviate tramite il nostro media server media.poilove.com (vedi sezione 5). Per ridurre i rischi, quando carichi una foto **rimuoviamo i metadati EXIF** (che includono GPS preciso, data, modello del dispositivo) prima di pubblicarla. Se usi una foto per creare un POI, possiamo leggere la posizione GPS contenuta nei suoi metadati al solo scopo di proporre il punto sulla mappa: quel dato non viene ripubblicato con la foto.

### 2.5 Contenuti che crei
- **POI** (luoghi che salvi), **"love" e preferiti**, **liste**, **itinerari di viaggio** con relative tappe, **compagnie di viaggio** (gruppi con altri utenti), relazioni di **follow** (chi segui e chi ti segue).

*Perché:* sono il cuore dell'app. Servono a costruire la tua mappa, condividere i luoghi, organizzare viaggi e seguire altre persone.

**Tag liberi sui POI.** Quando crei un POI puoi aggiungere tag testuali liberi (fino a 10). I tag dei POI pubblici sono visibili a tutta la comunità e vengono usati come suggerimenti di completamento automatico anche per chi non ha effettuato l'accesso. Non inserire nei tag dati personali tuoi o di altri.

**Segnalazione di una categoria mancante.** Se segnali che manca una categoria, registriamo il termine cercato insieme al tuo identificativo utente, per aggiornare e curare le categorie della piattaforma.

**Cessione e reclamo di un POI.** Se cedi un POI tramite codice o richiedi la proprietà di un luogo, trattiamo l'identità di chi cede e di chi riceve (identificativi e nome pubblico) ed eventuali messaggi di testo libero che scrivi nella richiesta: questi dati sono visibili all'amministrazione per gestire e validare l'operazione.

Alcuni di questi contenuti possono includere dati di **altre persone** (ad esempio i membri di una compagnia di viaggio, o l'email di chi inviti). Vedi la sezione 4.4.

### 2.6 Inviti e compagnie
- Quando inviti qualcuno a una compagnia di viaggio, trattiamo l'**email del destinatario** e un **codice di invito** per recapitargli il link.

*Perché:* per consentirti di invitare altre persone. L'invitato può accettare o ignorare. Inviamo un solo invito, con la possibilità di non ricevere altri messaggi.

### 2.7 Gamification e referral
- **Punti**, eventi che li generano (ad esempio creare un POI, dare un "love", condividere), **referral** (inviti che portano a nuove iscrizioni).

*Perché:* per far funzionare il sistema a punti, riconoscere i tuoi contributi e prevenire abusi e frodi. Registriamo solo le azioni che generano punti, non ogni singolo clic.

### 2.8 Segnalazioni e moderazione
- Quando **segnali** un contenuto o un profilo, registriamo la **segnalazione** (cosa hai segnalato, il motivo, la data) e chi l'ha inviata.
- Quando interveniamo a fini di moderazione, registriamo le **azioni di moderazione** (ad esempio sospensione, blocco, rimozione di un contenuto) e il loro motivo.

*Perché:* per mantenere la piattaforma sicura, gestire le segnalazioni, proteggere gli utenti e adempiere agli obblighi di legge. Conserviamo questi dati anche come prova in caso di abusi o contestazioni.

### 2.9 Abbonamenti a pagamento
- Se attivi un **abbonamento** a uno dei tier a pagamento (**Professionista, Professionista Plus, Sostenitore, Mecenate**, ed eventuali profili dedicati come **Influencer**), trattiamo i dati necessari a gestirlo: tier scelto, stato dell'abbonamento, data di attivazione e di rinnovo o cessazione, e i vantaggi collegati.
- I **dati di pagamento** veri e propri (ad esempio i dati della carta) sono trattati direttamente dal fornitore di pagamento che useremo al momento dell'attivazione, secondo la sua informativa: noi non conserviamo i numeri di carta.

*Perché:* per attivare e gestire l'abbonamento, riconoscerti i vantaggi del tier, emettere eventuali documenti contabili e adempiere agli obblighi fiscali e di legge.

### 2.10 Cosa NON salviamo
- La **cronologia delle ricerche** di indirizzi non viene conservata nel nostro database: resta nella sessione.
- La **dettatura vocale**, se la usi, viene convertita in testo dal tuo dispositivo o browser: **non registriamo né conserviamo l'audio**.

## 3. Basi giuridiche del trattamento

Ogni trattamento ha una base giuridica precisa (art. 13 legge 124/2024, art. 6 GDPR):

| Dato | Base giuridica |
|------|----------------|
| Email, password, dati di login | **Esecuzione del contratto**: senza, non possiamo darti il servizio |
| Username, nome, avatar, bio | **Esecuzione del contratto** e nostro **legittimo interesse** a gestire la piattaforma e prevenire abusi |
| Posizione GPS | **Consenso esplicito**, che puoi revocare in ogni momento |
| Foto che carichi | **Consenso esplicito** al caricamento; per foto che ritraggono persone vedi sezione 4 |
| Contenuti (POI, liste, itinerari, follow, compagnie) | **Esecuzione del contratto** |
| Email di invito a compagnie | **Consenso** tuo all'invio e tua dichiarazione di avere il consenso del destinatario |
| Punti, eventi, referral | **Legittimo interesse** a far funzionare la gamification e a prevenire frodi |
| Messaggi all'assistente AI (ILLI e copilota amministrativo) | **Esecuzione del contratto** per fornirti la funzione che hai richiesto, e nostro **legittimo interesse** a far funzionare e migliorare l'assistente |
| Segnalazioni e azioni di moderazione | **Legittimo interesse** alla sicurezza della piattaforma e degli utenti, e **obbligo legale** quando dobbiamo conservarle o agire |
| Dati di gestione dell'abbonamento a pagamento | **Esecuzione del contratto** di abbonamento e **obbligo legale** per gli adempimenti contabili e fiscali |
| Statistiche aggregate di utilizzo | **Legittimo interesse**, in forma anonima o pseudonimizzata |

In sintesi, le basi giuridiche su cui ci appoggiamo sono il **consenso** (per geolocalizzazione, foto e inviti), l'**esecuzione del contratto** (per account, contenuti, assistente AI e abbonamenti), il **legittimo interesse** (per sicurezza, prevenzione di abusi e frodi, gamification e statistiche aggregate) e l'**obbligo legale** (per moderazione, contabilità e fisco quando previsto dalla legge).

Quando la base è il **consenso** o il **legittimo interesse**, hai sempre il diritto di revocare il consenso o di opporti (vedi sezione 8).

---

## 4. Consenso, geolocalizzazione e foto: leggi qui

Questa è la sezione più importante per la tua tutela e per quella delle altre persone.

### 4.1 Come funziona il consenso
Il consenso che ti chiediamo è **libero, informato, specifico e inequivocabile**: lo dai con un'azione chiara (ad esempio attivando una funzione o spuntando una casella), mai con caselle già spuntate o per silenzio. Chiediamo consensi **separati** per cose diverse: uno per la geolocalizzazione, uno per il caricamento delle foto. Puoi accettarne uno e non l'altro.

Puoi **revocare il consenso in qualsiasi momento**, ed è facile come darlo: dalle impostazioni dell'app, del browser o del dispositivo. La revoca vale per il futuro e non rende illecito ciò che abbiamo trattato prima, legittimamente, mentre il consenso era attivo.

### 4.2 Geolocalizzazione
Attiviamo il GPS solo quando ti serve una funzione che lo richiede, e te lo segnaliamo. Quando chiudi quella funzione, smettiamo di usarlo. Se decidi di rendere pubblica una lista o una compagnia, ricorda che la posizione collegata può diventare visibile ad altri: valuta bene cosa condividi.

### 4.3 Foto: cosa puoi e cosa NON devi caricare
Le foto che carichi su un POI sono, per loro natura, destinate a essere **viste da altri utenti**. Prima di caricare una foto, leggi queste regole. Caricando una foto, dichiari di rispettarle e te ne assumi la responsabilità.

**Cosa NON devi caricare:**
- Foto che ritraggono **persone riconoscibili** (volti identificabili) **senza il loro consenso**. Questo vale anche per le persone sullo sfondo, non solo per il soggetto principale.
- Foto di **minori** senza il consenso di chi ne ha la responsabilità genitoriale.
- Foto che permettano di **riconoscere o identificare in modo univoco** una persona dal volto (dati biometrici): questo tipo di trattamento è vietato senza un consenso esplicito e specifico della persona interessata.
- Foto che violano la **privacy, la dignità o i diritti** di qualcuno, contenuti illeciti, offensivi, sessualmente espliciti, o di cui non possiedi i diritti.
- Documenti, targhe, dati sanitari o altre informazioni sensibili di terzi.

**Cosa ti consigliamo:**
- Preferisci foto del **luogo senza persone riconoscibili**: sono le più sicure per tutti.
- Se ci sono persone, assicurati di avere il loro consenso, oppure rendi i volti non riconoscibili.

**La tua responsabilità.** Quando carichi una foto che ritrae altre persone, rispetto a quelle persone agisci tu come responsabile della raccolta del loro consenso. POI•LOVE mette a disposizione lo strumento, ma la scelta di cosa caricare è tua. Se ricevi una segnalazione o una richiesta legittima, rimuoviamo prontamente i contenuti problematici (vedi sezione 8 per le segnalazioni).

### 4.4 Dati di altre persone nei tuoi contenuti
Quando inviti qualcuno a una compagnia di viaggio o inserisci altre persone nei tuoi contenuti, ci fornisci dati che riguardano loro (ad esempio un'email). Devi farlo solo se hai una base legittima per condividerli, e dichiari di averla. Chi viene invitato può sempre rifiutare e chiedere la rimozione dei propri dati.

### 4.5 Visibilità e impostazioni predefinite
Lavoriamo perché le impostazioni più prudenti siano quelle predefinite (ad esempio compagnie private per impostazione iniziale, e grafo dei follow non liberamente esplorabile da chiunque). Quando scegli di rendere qualcosa pubblico, te lo segnaliamo.

---

## 5. Con chi condividiamo i dati (servizi terzi e destinatari)

Per far funzionare POI•LOVE ci appoggiamo ad alcuni fornitori esterni, che trattano i dati come nostri responsabili (sub-responsabili) o come destinatari autonomi. La legge n. 124/2024 e il GDPR ci impongono di essere trasparenti su chi sono, su cosa ricevono e su dove vengono trattati i dati. Ecco l'elenco completo.

| Fornitore | Cosa riceve | A cosa serve | Dove |
|-----------|-------------|--------------|------|
| **Supabase** | Backend, autenticazione e archiviazione: profili, POI, foto, contenuti, punti, abbonamenti, segnalazioni | Infrastruttura dell'app (account, database, storage) | Hosting nell'**Unione Europea**, con possibili componenti negli **Stati Uniti** |
| **Google (login OAuth)** | Email, nome, avatar del tuo account Google | Accesso con Google | **Stati Uniti** |
| **Google (Google Places API)** | Il testo della ricerca di un luogo e le coordinate della zona | Ottenere informazioni reali sui posti: nome, valutazioni, tipo di luogo | **Stati Uniti** (e altri server Google fuori dall'UE), con garanzie adeguate |
| **X (Twitter)** e **LinkedIn** (login OAuth) | Email, nome/handle, avatar | Accesso con il tuo account | **Stati Uniti** |
| **OpenAI** | I **messaggi** che invii all'assistente AI **ILLI** e al **copilota amministrativo**, che possono includere la città o la zona di cui parli | Elaborare le risposte dell'assistente AI | **Stati Uniti**, con garanzie adeguate |
| **Anthropic** | I **messaggi** che invii all'assistente AI **ILLI** e al **copilota amministrativo**, che possono includere la città o la zona di cui parli | Elaborare le risposte dell'assistente AI | **Stati Uniti**, con garanzie adeguate |
| **OpenStreetMap / Nominatim / Overpass** | Coordinate e testo dell'indirizzo cercato, incluse le coordinate live quando cerchi luoghi reali vicino a te | Ricerca luoghi, conversione tra indirizzi e coordinate, elenco dei posti reali vicini | Server in **Europa** |
| **media.poilove.com** (nostro media server) | Le foto che carichi (POI e avatar) e un token che identifica la tua sessione | Archiviare e servire le foto dei luoghi e del profilo | **Germania** (server del progetto) |
| **api.qrserver.com** (goQR) | L'indirizzo pubblico del tuo profilo (che contiene il tuo username) | Generare il codice QR del profilo | Estero |
| **ui-avatars.com** | Le iniziali o il nome che compaiono nel tuo profilo | Generare un avatar segnaposto | Estero |
| **image.pollinations.ai** | Il testo che scrivi per generare un'immagine o un avatar con l'AI | Generazione di immagini con AI su tua richiesta | Estero |
| **Tile mappa (OpenStreetMap, ESRI ArcGIS) e CDN/font (jsDelivr, unpkg, Google Fonts)** | La zona della mappa che stai guardando, e in generale il tuo indirizzo IP e il tipo di dispositivo | Mostrare le mappe e caricare librerie e font | UE / USA |
| **App di navigazione (Google Maps, Waze, Apple Maps)** | Le coordinate del luogo verso cui chiedi indicazioni | Aprire la navigazione stradale su tua richiesta | USA |

A seconda della funzione e della configurazione, i messaggi inviati all'assistente AI possono essere elaborati da **OpenAI** oppure da **Anthropic**. La funzione lente, che mostra i luoghi reali vicini, invia le tue coordinate live a Google Places anche quando non hai effettuato l'accesso: usala solo se accetti questo invio. Il copilota amministrativo (Anthropic) può ricevere, lato amministrazione, campioni di dati reali della piattaforma (ad esempio username, tier, stato di moderazione) per assistere la gestione. In entrambi i casi i server sono negli **Stati Uniti** e il trattamento avviene secondo l'informativa del fornitore. **Non inserire dati sensibili o riservati** (ad esempio dati su salute, dati di altre persone, password o documenti) nelle chat con l'assistente AI.

Non vendiamo i tuoi dati e non li cediamo a terzi per finalità pubblicitarie.

Con i fornitori che trattano dati per nostro conto stipuliamo, dove previsto, accordi sul trattamento dei dati (DPA), e teniamo aggiornato un registro dei trattamenti e dei destinatari, come richiesto dalla legge.

### 5.1 Trasferimenti fuori dall'Albania e dall'Unione Europea
Alcuni fornitori (in particolare **OpenAI**, **Anthropic** e **Google**) hanno server negli **Stati Uniti**, e anche **Supabase** può avere componenti negli Stati Uniti. Inviare i tuoi dati lì costituisce un trasferimento verso un Paese terzo, che gli Stati Uniti, in generale, non sono considerati adeguati né dall'Albania né dall'UE.

Per rendere lecito questo trasferimento ci basiamo, a seconda dei casi, su:
- **garanzie contrattuali adeguate** (ad esempio clausole tipo di protezione dei dati) offerte da questi fornitori, e, dove richiesto dalla normativa albanese, sull'**autorizzazione preventiva dell'Autorità (Commissario)**;
- in mancanza di tali garanzie, il tuo **consenso esplicito e informato sui rischi** del trasferimento, ad esempio quando scegli di usare l'assistente ILLI o la ricerca di luoghi che richiedono questi servizi.

Trasferire dati negli Stati Uniti comporta che autorità di quel Paese possano, in certi casi, accedervi con tutele diverse da quelle europee e albanesi. Cerchiamo di **minimizzare** i dati inviati: ad esempio all'assistente AI (OpenAI o Anthropic) arrivano i tuoi messaggi e la zona di cui parli, non il tuo nome o il tuo account; e a Google Places arrivano il testo della ricerca e la zona, non la tua identità. Se non vuoi che certi dati lascino l'area UE/Albania, puoi evitare di usare le funzioni che si appoggiano a questi fornitori (assistente ILLI, copilota amministrativo, ricerca tramite Google Places). E in ogni caso, come ricordato sopra, non inserire dati sensibili nelle chat con l'assistente AI.

---

## 6. Per quanto conserviamo i dati

| Dato | Conservazione |
|------|---------------|
| Account, profilo, contenuti (POI, liste, itinerari, follow) | Finché tieni attivo l'account. Alla cancellazione dell'account, li eliminiamo o anonimizziamo |
| Foto caricate | Finché restano nei tuoi contenuti o fino alla cancellazione dell'account, o prima su tua richiesta |
| Posizione GPS | Conservata solo se la salvi dentro un contenuto (un POI, una tappa). Non teniamo uno storico continuo dei tuoi spostamenti |
| Eventi di gamification e referral | Per il tempo necessario al funzionamento del sistema a punti e alla prevenzione delle frodi, con cancellazioni periodiche dei dati più vecchi |
| Email di invito a compagnie | Per il tempo necessario a gestire l'invito |
| Messaggi all'assistente AI | Il tempo necessario a fornirti la risposta e a far funzionare l'assistente. La conservazione lato fornitore (OpenAI, Anthropic) segue le rispettive informative |
| Segnalazioni e azioni di moderazione | Per il tempo necessario alla sicurezza della piattaforma e, dove richiesto, per adempiere a obblighi di legge o difendere un diritto |
| Dati di gestione dell'abbonamento | Per la durata dell'abbonamento e, per i documenti contabili e fiscali, per il periodo previsto dalla legge |
| Dati di autenticazione | Finché esiste l'account |

Quando un dato non è più necessario per le finalità per cui è stato raccolto, lo cancelliamo o lo rendiamo anonimo. Alcuni dati possono essere conservati più a lungo se serve per adempiere a obblighi di legge o per difendere un diritto in sede legale.

---

## 7. Come proteggiamo i tuoi dati (sicurezza)

Adottiamo misure tecniche e organizzative per proteggere i tuoi dati, tra cui:
- **Row Level Security (RLS)** sul database: ogni utente può accedere solo ai dati a cui ha diritto.
- **Chiavi API tenute lato server**, dietro funzioni protette (Edge Function): non viaggiano mai nel browser e non sono esposte agli utenti.
- **HTTPS** su tutte le connessioni: i dati viaggiano cifrati.
- **File interni del progetto bloccati** dalla parte pubblica del sito, così non sono raggiungibili dall'esterno.
- **Password cifrate** e gestione dell'autenticazione tramite un fornitore specializzato.
- **Rimozione dei metadati EXIF** dalle foto prima della pubblicazione.

Nessun sistema è sicuro al 100%. Se si verificasse una violazione dei dati con rischio per i tuoi diritti, lo notificheremo all'Autorità (Commissario) entro **72 ore** e, nei casi a rischio elevato, anche a te senza ingiustificato ritardo, come prevede la legge.

---

## 8. I tuoi diritti e come esercitarli

Hai pieno controllo sui tuoi dati. In base alla legge 124/2024 e al GDPR puoi:

- **Accedere** ai tuoi dati e ottenerne una copia (la prima è gratuita).
- **Rettificare** dati inesatti o incompleti.
- **Cancellare** i tuoi dati e **chiudere l'account**: dalle impostazioni del profilo trovi la cancellazione dell'account, che elimina o anonimizza i tuoi dati. Puoi anche chiederla scrivendoci.
- **Opporti** a un trattamento basato sul legittimo interesse, e in particolare opporti in modo assoluto a eventuali comunicazioni di marketing diretto.
- **Limitare** il trattamento in certi casi.
- **Portabilità**: ricevere i tuoi dati in un formato strutturato e leggibile, e, dove tecnicamente possibile, trasferirli ad altri.
- **Revocare il consenso** in qualsiasi momento, per la geolocalizzazione, le foto o qualsiasi trattamento basato sul consenso.

Per esercitare questi diritti, o per segnalare una foto o un contenuto che ti riguarda, scrivi a **it@altrostile.app**. Rispondiamo **entro 30 giorni** dalla richiesta. Le risposte sono gratuite; per copie ulteriori possiamo chiedere un contributo ragionevole per i costi.

Non usiamo i tuoi dati per prendere **decisioni esclusivamente automatizzate** che producano effetti giuridici su di te o ti riguardino in modo significativo. Se questo dovesse cambiare, te ne informeremo e ti spiegheremo la logica e le conseguenze.

## 9. Minori

POI•LOVE non è pensata per i bambini. Per usarla, e per i trattamenti basati sul consenso, devi avere **almeno 16 anni**. Se hai meno di 16 anni, puoi usarla solo con il consenso di chi esercita la responsabilità genitoriale.

Non raccogliamo consapevolmente dati di minori sotto questa soglia senza il consenso richiesto. Se sei un genitore o tutore e ritieni che un minore ci abbia fornito dati senza il dovuto consenso, scrivici a **it@altrostile.app**: rimuoveremo prontamente quei dati.

Possiamo aggiornare questa informativa, ad esempio se aggiungiamo funzioni o cambiamo fornitori. Quando la modifica è rilevante, te lo segnaliamo nell'app o via email e aggiorniamo la data in alto. Ti invitiamo a rileggerla di tanto in tanto. L'uso continuato dell'app dopo un aggiornamento vale come presa visione della versione più recente.

Se ritieni che il trattamento dei tuoi dati violi la legge, puoi sempre proporre un reclamo all'autorità di controllo competente.

In Albania è il **Commissario per il diritto all'informazione e la protezione dei dati personali (Komisioneri për të Drejtën e Informimit dhe Mbrojtjen e të Dhënave Personale, IDP)**, sito **idp.al**.

Se ti trovi nell'Unione Europea, puoi rivolgerti anche all'autorità di controllo del tuo Paese di residenza.
