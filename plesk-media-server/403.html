<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POI•LOVE Media Server</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #EAE4D8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    text-align: center;
    padding: 48px 40px;
    max-width: 420px;
  }
  .logo { width: 180px; margin-bottom: 32px; }
  h1 {
    font-size: 15px;
    font-weight: 600;
    color: #285EA7;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  p {
    font-size: 14px;
    color: #6b6460;
    line-height: 1.6;
  }
  .dot { color: #D42B2B; }
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="https://poilove.com/img/logo-completo.svg" alt="POI•LOVE" onerror="this.style.display='none'">
  <h1>Media Server</h1>
  <p>This is a private API endpoint.<br>Direct access is not permitted.</p>
</div>
</body>
</html>
